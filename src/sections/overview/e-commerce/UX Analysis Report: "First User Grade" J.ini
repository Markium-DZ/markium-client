  5. PRIORITIZED RECOMMENDATIONS

  Tier 1: Quick Wins (1-2 hours each, high impact)

  1. Fix hardcoded strings - Replace all English strings in
  order-details-history.jsx with t() calls
  2. Fix currency symbol - Change $0.00 to DZD 0.00 in en.json and
  standardize DA vs DZD
  3. Remove console.logs - Clean up all console.log/console.info from
  production code
  4. Translate error message - Replace 'Failed to update order status'
  with t('error_updating_status')

  Tier 2: Important Improvements (half-day each)

  5. Clean up OrdersListView imports - Remove all unused legacy
  car/driver/contract imports
  6. Add upload progress - Show a progress bar or percentage during
  media upload
  7. Show all validation errors - Display a summary of all form errors,
   not just the first one
  8. Complete shipping rate selection - Add a "Confirm Shipping" button
   after selecting a rate

  Tier 3: UX Enhancements (1-2 days each)

  9. Add empty state for orders - When no orders exist, show an
  illustration with "Your first order will appear here" + link to share
   storefront
  10. Standardize translation patterns - Pick one pattern (useTranslate
   or useTranslation) and refactor all components
  11. Fix order history timestamps - Show actual event-specific
  timestamps or hide events that haven't occurred yet
  12. Fix useMemo side effect - Replace with useEffect for variant
  syncing in ProductVariantsManager

  Tier 3: Strategic Improvements (multi-day)

  13. Add product creation wizard - For first-time users, consider a
  step-by-step wizard instead of a single long form in a drawer
  14. Add order creation from dashboard - Allow merchants to manually
  create orders for phone/in-person sales
  15. Add real-time order notifications - When a new order comes in,
  show a toast/notification on the dashboard

