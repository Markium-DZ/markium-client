UX Analysis Report: "First User Grade" Journey                     

  (1 Product Creation + 1 Order Management)

  ---
  1. JOURNEY MAP: PRODUCT CREATION

  Flow Overview

  Dashboard (New User) --> Welcome Banner --> Setup Checklist -->
    "Create Product" button --> Drawer opens (50% viewport) -->
    Product Form (Timeline Steps) --> Submit --> Redirect to product
  list

  Step-by-Step Walkthrough
  Step: 1
  User Action: Lands on Dashboard
  Screen Element: welcome-new-user.jsx shows welcome banner
  Friction Level: LOW
  ────────────────────────────────────────
  Step: 2
  User Action: Sees Setup Checklist
  Screen Element: setup-checklist.jsx with 3 steps: Upload Images, Add
    Product, Customize Store
  Friction Level: LOW
  ────────────────────────────────────────
  Step: 3
  User Action: Clicks "Create Product"
  Screen Element: Opens a Drawer (not a full page) from left side
  Friction Level: MEDIUM
  ────────────────────────────────────────
  Step: 4
  User Action: Sees Mode Toggle
  Screen Element: Simple vs Advanced toggle at top
  Friction Level: MEDIUM
  ────────────────────────────────────────
  Step: 5
  User Action: Fills Product Info
  Screen Element: Name (required), Description, Content (Rich Editor)
  Friction Level: LOW
  ────────────────────────────────────────
  Step: 6
  User Action: Uploads Media
  Screen Element: Clicks area to open MediaPickerDialog
  Friction Level: MEDIUM
  ────────────────────────────────────────
  Step: 7
  User Action: Sets Category & Tags
  Screen Element: Dropdown for category, autocomplete for tags
  Friction Level: LOW
  ────────────────────────────────────────
  Step: 8
  User Action: Sets Pricing
  Screen Element: Sale price (required), Compare-at price, Quantity
  Friction Level: LOW
  ────────────────────────────────────────
  Step: 9
  User Action: Submits
  Screen Element: "Create Product" button at bottom
  Friction Level: LOW
  ---
  2. JOURNEY MAP: ORDER MANAGEMENT

  Flow Overview

  Dashboard --> Orders List (sidebar nav) --> Orders Table with tabs
  -->
    Click order row --> Order Detail View (3 tabs) --> Change Status

  Critical Finding: There is NO customer-facing
  checkout/order-placement flow. The src/sections/checkout/ directory
  exists but contains only boilerplate template code. Orders come in
  externally (likely from a storefront API). The dashboard user manages
   orders, not places them.

  Step-by-Step Walkthrough
  Step: 1
  User Action: Navigates to Orders
  Screen Element: OrdersListView.jsx - table with status tabs
  Friction Level: LOW
  ────────────────────────────────────────
  Step: 2
  User Action: Filters by status tab
  Screen Element: All, Today, Pending, Confirmed, Shipped, Delivered,
    Cancelled
  Friction Level: LOW
  ────────────────────────────────────────
  Step: 3
  User Action: Searches orders
  Screen Element: Search by name, phone, product, address
  Friction Level: LOW
  ────────────────────────────────────────
  Step: 4
  User Action: Clicks customer name
  Screen Element: Navigates to order-details-view.jsx
  Friction Level: LOW
  ────────────────────────────────────────
  Step: 5
  User Action: Views order details
  Screen Element: 3 tabs: Order Items, Customer Info, Shipping Rates
  Friction Level: MEDIUM
  ────────────────────────────────────────
  Step: 6
  User Action: Changes order status
  Screen Element: Dropdown in toolbar or 3-dot menu on list
  Friction Level: LOW
  ────────────────────────────────────────
  Step: 7
  User Action: Selects shipping rate
  Screen Element: Radio button selection from provider quotes
  Friction Level: MEDIUM
