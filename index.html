<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="theme-color" content="#000000" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5" />
    <link rel="manifest" href="/manifest.json" />

    <!-- Favicon -->
    <link rel="icon" href="/favicon/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />

    <!-- Google Font (non-render-blocking) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@100..900&family=Noto+Naskh+Arabic:wght@400..700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />

    <!-- Preload LCP background image (used on login page) -->
    <link rel="preload" href="/assets/background/overlay_2.jpg" as="image" />

    <!-- SEO -->
    <title>Markium - Tableau de bord E-commerce pour l'Algerie</title>
    <meta
      name="description"
      content="Plateforme de gestion e-commerce pour entreprises algeriennes. Gerez vos produits, commandes, inventaire, livraisons et facturation depuis un seul tableau de bord."
    />
    <meta
      name="keywords"
      content="gestion e-commerce Algerie, logiciel inventaire, tableau de bord commerce, gestion commandes, plateforme vente en ligne, facturation Algerie"
    />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <meta name="author" content="Markium" />
    <link rel="canonical" href="https://markium.online/" />

    <!-- Open Graph -->
    <meta property="og:locale" content="fr_DZ" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Markium - Tableau de bord E-commerce pour l'Algerie" />
    <meta
      property="og:description"
      content="Tableau de bord e-commerce tout-en-un pour entreprises algeriennes. Gerez produits, commandes, inventaire et livraisons depuis une seule plateforme."
    />
    <meta property="og:url" content="https://markium.online/" />
    <meta property="og:site_name" content="Markium" />
    <meta property="og:image" content="https://markium.online/favicon/android-chrome-512x512.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:image:alt" content="Markium - Gestion e-commerce pour l'Algerie" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Markium - Tableau de bord E-commerce" />
    <meta
      name="twitter:description"
      content="Plateforme e-commerce pour entreprises algeriennes. Gerez produits, commandes, inventaire et analytiques."
    />
    <meta name="twitter:image" content="https://markium.online/favicon/android-chrome-512x512.png" />
    <meta name="twitter:image:alt" content="Markium" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebApplication",
          "@id": "https://markium.online/#webapp",
          "name": "Markium",
          "url": "https://markium.online",
          "applicationCategory": "BusinessApplication",
          "description": "Plateforme de gestion e-commerce pour entreprises algeriennes. Produits, commandes, inventaire, livraisons, facturation et analytiques.",
          "inLanguage": ["fr", "ar", "en"],
          "operatingSystem": "Web Browser",
          "offers": {
            "@type": "Offer",
            "priceCurrency": "DZD",
            "availability": "https://schema.org/InStock"
          },
          "featureList": [
            "Gestion des produits",
            "Gestion des commandes",
            "Suivi d'inventaire",
            "Gestion des livraisons",
            "Facturation",
            "Tableau de bord analytique"
          ],
          "author": { "@id": "https://markium.online/#organization" },
          "publisher": { "@id": "https://markium.online/#organization" }
        },
        {
          "@type": "Organization",
          "@id": "https://markium.online/#organization",
          "name": "Markium",
          "url": "https://markium.online",
          "logo": "https://markium.online/favicon/android-chrome-512x512.png",
          "areaServed": {
            "@type": "Country",
            "name": "Algeria"
          }
        }
      ]
    }
    </script>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script>
      const global = globalThis;
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
